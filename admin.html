<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Adicionar Música</title>
</head>

<body style="font-family:sans-serif;background:#111;color:white;padding:40px">

<h2>Adicionar música</h2>

<input id="url" placeholder="Cole link do YouTube"
style="width:400px;padding:10px">

<button onclick="add()">Adicionar</button>

<p id="status"></p>

<script>

const WORKER = "https://playlist-api.rafaelahersing85.workers.dev";

async function add(){

const url = document.getElementById("url").value;

document.getElementById("status").innerText="Processando...";

try{

// pegar dados do vídeo
const oembed = await fetch(`https://www.youtube.com/oembed?url=${url}&format=json`);
const data = await oembed.json();

const title = data.title.replace(/[^\w\s]/gi,"");
const cover = data.thumbnail_url;

// baixar áudio via cobalt direto no navegador
const cobalt = await fetch("https://api.cobalt.tools/api/json",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({url:url,vCodec:"mp3"})
});

const cdata = await cobalt.json();

const audio = await fetch(cdata.url);
const blob = await audio.blob();

// upload
const form = new FormData();
form.append("file",blob,`${title}.mp3`);
form.append("title",title);
form.append("cover",cover);

await fetch(WORKER+"/upload",{
method:"POST",
body:form
});

document.getElementById("status").innerText="✅ Música adicionada";

}catch(e){

document.getElementById("status").innerText="❌ "+e.message;

}

}

</script>

</body>
</html>
