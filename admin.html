<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Adicionar Música</title>
</head>

<body>

<h2>Adicionar música</h2>

<input id="url" placeholder="Cole o link do YouTube" style="width:400px">
<button onclick="add()">Adicionar</button>

<p id="status"></p>

<script>

const WORKER = "https://playlist-api.rafaelahersing85.workers.dev";

async function add(){

const videoUrl = document.getElementById("url").value;

if(!videoUrl){
alert("Cole um link");
return;
}

document.getElementById("status").innerText = "baixando...";

try{

const res = await fetch(WORKER + "/add",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
url:videoUrl
})
});

const data = await res.json();

if(data.success){

document.getElementById("status").innerText = "música adicionada";

}else{

document.getElementById("status").innerText = "erro: " + data.error;

}

}catch(e){

document.getElementById("status").innerText = "erro conexão";

}

}

</script>

</body>
</html>
