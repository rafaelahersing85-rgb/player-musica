<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Música</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        h2 { margin-top: 0; color: #1DB954; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1DB954; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        button:disabled { background: #555; }
        #status { margin-top: 15px; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Adicionar Música</h2>
    <p>Cole o link do YouTube abaixo:</p>
    
    <input type="text" id="ytUrl" placeholder="https://youtube.com/watch?v=...">
    <input type="text" id="fileName" placeholder="Nome da Música (ex: Nome do Artista - Titulo)">
    
    <button id="btn" onclick="enviarMusica()">Adicionar à Playlist</button>
    
    <div id="status"></div>
</div>

<script>
    async function enviarMusica() {
        const videoUrl = document.getElementById('ytUrl').value;
        const fileName = document.getElementById('fileName').value;
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        if (!videoUrl || !fileName) {
            alert("Preencha todos os campos!");
            return;
        }

        btn.disabled = true;
        status.innerText = "Processando... (Pode levar um minuto)";
        status.style.color = "yellow";

        try {
            // URL do seu Worker playlist-api
            const response = await fetch('https://playlist-api.rafaelahering85.workers.dev/add-music', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ videoUrl, fileName })
            });

            if (response.ok) {
                status.innerText = "✅ Sucesso! A música aparecerá no player em breve.";
                status.style.color = "#1DB954";
                document.getElementById('ytUrl').value = "";
                document.getElementById('fileName').value = "";
            } else {
                throw new Error("Erro no processamento.");
            }
        } catch (err) {
            status.innerText = "❌ Erro ao adicionar. Verifique o log do Worker.";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
