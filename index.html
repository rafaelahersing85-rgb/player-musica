<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      :root {
        --primary-color: #004085;
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
      }

      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: var(--bg-color); padding-bottom: 160px; color: #333; margin: 0; }
      
      .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      h2 { color: #333; font-size: 1.1em; margin: 0; padding-left: 5px; }
      .admin-link { color: var(--primary-color); text-decoration: none; font-size: 0.8em; font-weight: bold; border: 1px solid var(--primary-color); padding: 5px 10px; border-radius: 15px; }

      #filters { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
      .filter-btn { background: #e0e0e0; color: #333; border: 1px solid #ccc; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.9em; }
      .filter-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

      .song-card { background: var(--card-bg); padding: 12px; margin-bottom: 8px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; cursor: pointer; transition: transform 0.2s; border-left: 5px solid transparent; }
      .song-card:active { transform: scale(0.98); }
      .cover { width: 45px; height: 45px; border-radius: 6px; margin-right: 12px; object-fit: cover; background: #ddd; }
      .title { font-weight: 600; flex-grow: 1; font-size: 0.95em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .playing { border-left: 5px solid var(--primary-color); background-color: #f0f7ff; }

      #player-bar { 
        position: fixed; 
        bottom: 20px; 
        left: 50%;
        transform: translateX(-50%); 
        width: 92%; 
        max-width: 400px;
        background: rgba(255, 255, 255, 0.98); 
        padding: 15px; 
        border-radius: 25px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        z-index: 1000; 
        box-sizing: border-box; 
        backdrop-filter: blur(10px);
      }
      
      #now-playing { text-align: center; display: block; font-weight: bold; color: var(--primary-color); font-size: 0.85em; margin-bottom: 8px; height: 1.2em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      .progress-container { width: 100%; height: 5px; background: #eee; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
      .progress-bar { width: 0%; height: 100%; background: var(--primary-color); border-radius: 10px; }
      .time-info { display: flex; justify-content: space-between; font-size: 0.7em; color: #777; margin-top: 4px; }
      
      .player-controls { display: flex; align-items: center; justify-content: space-around; }
      .control-icon { background: none; border: none; color: var(--primary-color); font-size: 1.2em; cursor: pointer; padding: 8px; transition: 0.2s; }
      .control-icon:active { transform: scale(0.9); opacity: 0.7; }
      
      .play-pause-btn { font-size: 1.5em; border: 2px solid var(--primary-color); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }

      audio { display: none; }
    </style>
  </head>
  <body>
    <div class="header-flex">
        <h2>📁 Pastas</h2>
        <a href="admin.html" class="admin-link">+ Add Música</a>
    </div>
    <div id="filters">Carregando pastas...</div>
    
    <div id="playlist-header">
      <h2 id="current-category">Diversos</h2>
    </div>
    <div id="playlist">Buscando arquivos...</div>

    <div id="player-bar">
      <span id="now-playing">Selecione uma música</span>
      
      <div class="progress-container" id="progress-area">
        <div class="progress-bar" id="progress-fill"></div>
        <div class="time-info">
          <span id="current-time">0:00</span>
          <span id="total-duration">0:00</span>
        </div>
      </div>

      <audio id="main-audio"></audio>
      
      <div class="player-controls">
        <button class="control-icon" onclick="shuffleCurrent()" title="Aleatório">
          <i class="fas fa-random"></i>
        </button>
        
        <button class="control-icon" onclick="prevSong()" title="Anterior">
          <i class="fas fa-step-backward"></i>
        </button>
        
        <button class="control-icon play-pause-btn" onclick="togglePlay()" id="play-pause-btn">
          <i class="fas fa-play" id="play-icon"></i>
        </button>
        
        <button class="control-icon" onclick="nextSong()" title="Próxima">
          <i class="fas fa-step-forward"></i>
        </button>
        
        <button class="control-icon" onclick="toggleLoop()" id="loop-btn" style="opacity: 0.5;">
          <i class="fas fa-redo"></i>
        </button>
      </div>
    </div>

    <script>
      const WORKER_URL = 'https://playlist-api.rafaelahering85.workers.dev/'; 

      let allSongs = [];   
      let displayedSongs = []; 
      let currentIndex = -1;
      let isLooping = false;

      const mainAudio = document.getElementById('main-audio');
      const playIcon = document.getElementById('play-icon');
      const progressFill = document.getElementById('progress-fill');
      const progressArea = document.getElementById('progress-area');
      const currentTimeText = document.getElementById('current-time');
      const totalDurationText = document.getElementById('total-duration');

      async function init() {
        try {
          const response = await fetch(WORKER_URL);
          allSongs = await response.json();
          renderFilters();
          
          // Se houver músicas, seleciona a primeira pasta disponível ou 'Diversos'
          const firstFolder = allSongs.length > 0 ? allSongs[0].folder : 'Diversos';
          filterBy(firstFolder);
        } catch (e) {
          document.getElementById('playlist').innerText = "Erro ao carregar músicas.";
        }
      }

      function renderFilters() {
        const folders = ['Tudo', ...new Set(allSongs.map(s => s.folder))];
        document.getElementById('filters').innerHTML = folders.map(f => 
          `<button class="filter-btn" id="btn-${f}" onclick="filterBy('${f}')">${f}</button>`
        ).join('');
      }

      function filterBy(folder) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById(`btn-${folder}`);
        if(btn) btn.classList.add('active');

        if (folder === 'Tudo') {
          displayedSongs = [...allSongs];
          document.getElementById('current-category').innerText = "Todas as Músicas";
        } else {
          displayedSongs = allSongs.filter(s => s.folder === folder);
          document.getElementById('current-category').innerText = `Pasta: ${folder}`;
        }
        currentIndex = -1; 
        renderPlaylist();
      }

      function renderPlaylist() {
        const div = document.getElementById('playlist');
        div.innerHTML = displayedSongs.map((s, i) => `
          <div class="song-card ${currentIndex === i ? 'playing' : ''}" id="card-${i}" onclick="playSong(${i})">
            <img src="${s.cover}" class="cover" onerror="this.src='https://via.placeholder.com/60?text=♫'">
            <div class="title">${s.title}</div>
          </div>
        `).join('');
      }

      function shuffleCurrent() {
        if (displayedSongs.length === 0) return;
        for (let i = displayedSongs.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [displayedSongs[i], displayedSongs[j]] = [displayedSongs[j], displayedSongs[i]];
        }
        renderPlaylist();
        playSong(0);
      }

      function playSong(i) {
        if (i < 0 || i >= displayedSongs.length) return;
        currentIndex = i;
        mainAudio.src = displayedSongs[i].url;
        mainAudio.play();
        document.querySelectorAll('.song-card').forEach(card => card.classList.remove('playing'));
        const currentCard = document.getElementById(`card-${i}`);
        if(currentCard) currentCard.classList.add('playing');
        document.getElementById('now-playing').innerText = displayedSongs[i].title;
        updatePlayPauseIcon();
      }

      function togglePlay() {
        if (currentIndex === -1 && displayedSongs.length > 0) {
            playSong(0);
            return;
        }
        mainAudio.paused ? mainAudio.play() : mainAudio.pause();
        updatePlayPauseIcon();
      }

      function updatePlayPauseIcon() {
        playIcon.className = mainAudio.paused ? 'fas fa-play' : 'fas fa-pause';
      }

      function nextSong() { if(displayedSongs.length > 0) playSong((currentIndex + 1) % displayedSongs.length); }
      function prevSong() { if(displayedSongs.length > 0) playSong((currentIndex - 1 + displayedSongs.length) % displayedSongs.length); }

      function toggleLoop() {
        isLooping = !isLooping;
        mainAudio.loop = isLooping;
        document.getElementById('loop-btn').style.opacity = isLooping ? '1' : '0.5';
      }

      mainAudio.addEventListener('timeupdate', () => {
        const { duration, currentTime } = mainAudio;
        if (!isNaN(duration)) {
          const percent = (currentTime / duration) * 100;
          progressFill.style.width = `${percent}%`;
          currentTimeText.innerText = formatTime(currentTime);
          totalDurationText.innerText = formatTime(duration);
        }
      });

      progressArea.addEventListener('click', (e) => {
        const width = progressArea.clientWidth;
        const clickX = e.offsetX;
        const duration = mainAudio.duration;
        if (!isNaN(duration)) mainAudio.currentTime = (clickX / width) * duration;
      });

      function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
      }
      
      mainAudio.onended = () => { if(!isLooping) nextSong(); };
      init();
    </script>
  </body>
</html>
