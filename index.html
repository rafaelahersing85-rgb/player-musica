<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meu Player</title>
</head>

<body style="font-family:sans-serif;background:#111;color:white;padding:40px">

<h1>Minha Playlist</h1>

<div id="list"></div>

<audio id="player" controls style="width:100%;margin-top:20px"></audio>

<script>

const API="https://playlist-api.rafaelahersing85.workers.dev";

async function load(){

const res=await fetch(API);
const musicas=await res.json();

const list=document.getElementById("list");

musicas.forEach(m=>{

const div=document.createElement("div");

div.style.marginBottom="15px";

div.innerHTML=`
<img src="${m.cover}" width="80">
<b>${m.title}</b>
<button onclick="play('${m.url}')">▶</button>
`;

list.appendChild(div);

});

}

function play(url){

const player=document.getElementById("player");

player.src=url;
player.play();

}

load();

</script>

</body>
</html>
