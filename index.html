<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      :root {
        --primary-color: #004085; /* Azul escuro idêntico à imagem de referência */
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
      }

      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: var(--bg-color); padding-bottom: 120px; color: #333; margin: 0; }
      
      h2 { color: #333; font-size: 1.1em; margin-bottom: 10px; padding-left: 5px; }
      
      /* Estilo dos Filtros (Pastas) */
      #filters { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
      .filter-btn { background: #e0e0e0; color: #333; border: 1px solid #ccc; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.9em; }
      .filter-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

      /* Estilo da Lista de Músicas */
      .song-card { background: var(--card-bg); padding: 12px; margin-bottom: 8px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; cursor: pointer; transition: transform 0.2s; }
      .song-card:active { transform: scale(0.98); }
      .cover { width: 45px; height: 45px; border-radius: 6px; margin-right: 12px; object-fit: cover; background: #ddd; }
      .title { font-weight: 600; flex-grow: 1; font-size: 0.95em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .playing { border-left: 5px solid var(--primary-color); background-color: #f0f7ff; }

      /* --- NOVA BARRA DE CONTROLE (ESTILO APP) --- */
      #player-bar { 
        position: fixed; 
        bottom: 20px; /* Flutuando um pouco do fundo */
        left: 50%;
        transform: translateX(-50%); /* Centraliza */
        width: 90%; /* Largura otimizada para celular */
        max-width: 400px;
        background: rgba(255, 255, 255, 0.95); /* Semi-transparente */
        padding: 15px; 
        border-radius: 30px; /* Bordas bem arredondadas como na referência */
        box-shadow: 0 5px 20px rgba(0,0,0,0.15); 
        z-index: 1000; 
        box-sizing: border-box; 
        backdrop-filter: blur(5px); /* Efeito de vidro */
      }
      
      #now-playing { text-align: center; display: block; font-weight: bold; color: var(--primary-color); font-size: 0.85em; margin-bottom: 10px; height: 1.2em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      
      .player-controls { 
        display: flex; 
        align-items: center; 
        justify-content: space-around; /* Espaçamento igual entre os ícones */
        max-width: 300px;
        margin: 0 auto;
      }
      
      /* Estilo dos ícones de controle */
      .control-icon { 
        background: none; 
        border: none; 
        color: var(--primary-color); /* Cor azul escura da imagem */
        font-size: 1.3em; /* Tamanho dos ícones laterais */
        cursor: pointer; 
        padding: 10px;
        transition: opacity 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .control-icon:active { opacity: 0.5; }
      
      /* Destaque para o botão Play/Pause central (Círculo na imagem) */
      .play-pause-btn {
        font-size: 1.6em; /* Maior que os outros */
        border: 2px solid var(--primary-color);
        border-radius: 50%;
        width: 55px;
        height: 55px;
        padding: 0;
      }

      /* Esconde o elemento audio padrão */
      audio { display: none; }
    </style>
  </head>
  <body>
    <h2>📁 Pastas</h2>
    <div id="filters">Carregando pastas...</div>
    
    <div id="playlist-header">
      <h2 id="current-category">Diversos</h2>
    </div>
    <div id="playlist">Buscando arquivos...</div>

    <div id="player-bar">
      <span id="now-playing">Selecione uma música</span>
      <audio id="main-audio"></audio>
      
      <div class="player-controls">
        <button class="control-icon" onclick="shuffleCurrent()" title="Aleatório">
          <i class="fas fa-random"></i>
        </button>
        
        <button class="control-icon" onclick="prevSong()" title="Anterior">
          <i class="fas fa-step-backward"></i>
        </button>
        
        <button class="control-icon play-pause-btn" onclick="togglePlay()" id="play-pause-btn" title="Play/Pause">
          <i class="fas fa-play" id="play-icon"></i>
        </button>
        
        <button class="control-icon" onclick="nextSong()" title="Próxima">
          <i class="fas fa-step-forward"></i>
        </button>
        
        <button class="control-icon" onclick="toggleLoop()" id="loop-btn" title="Repetir">
          <i class="fas fa-redo"></i>
        </button>
      </div>
    </div>

    <script>
      // MANTENDO A SUA URL DO WORKER
      const WORKER_URL = 'https://playlist-api.rafaelahersing85.workers.dev/'; 

      let allSongs = [];   
      let displayedSongs = []; 
      let currentIndex = -1;
      let isLooping = false;
      const mainAudio = document.getElementById('main-audio');
      const playIcon = document.getElementById('play-icon');

      async function init() {
        try {
          const response = await fetch(WORKER_URL);
          allSongs = await response.json();
          renderFilters();
          filterBy('Diversos'); // Começa com o filtro padrão 'Diversos'
        } catch (e) {
          document.getElementById('playlist').innerText = "Erro ao carregar músicas.";
        }
      }

      function renderFilters() {
        const folders = ['Tudo', ...new Set(allSongs.map(s => s.folder))];
        document.getElementById('filters').innerHTML = folders.map(f => 
          `<button class="filter-btn" id="btn-${f}" onclick="filterBy('${f}')">${f}</button>`
        ).join('');
      }

      function filterBy(folder) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById(`btn-${folder}`);
        if(btn) btn.classList.add('active');

        if (folder === 'Tudo') {
          displayedSongs = [...allSongs];
          document.getElementById('current-category').innerText = "Todas as Músicas";
        } else {
          displayedSongs = allSongs.filter(s => s.folder === folder);
          document.getElementById('current-category').innerText = `Pasta: ${folder}`;
        }
        renderPlaylist();
      }

      function shuffleCurrent() {
        for (let i = displayedSongs.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [displayedSongs[i], displayedSongs[j]] = [displayedSongs[j], displayedSongs[i]];
        }
        renderPlaylist();
        if (displayedSongs.length > 0) playSong(0);
      }

      function renderPlaylist() {
        const div = document.getElementById('playlist');
        div.innerHTML = displayedSongs.map((s, i) => `
          <div class="song-card" id="card-${i}" onclick="playSong(${i})">
            <img src="${s.cover}" class="cover" onerror="this.src='https://via.placeholder.com/60?text=♫'">
            <div class="title">${s.title}</div>
          </div>
        `).join('');
      }

      function playSong(i) {
        if (currentIndex !== -1) {
          const old = document.getElementById(`card-${currentIndex}`);
          if (old) old.classList.remove('playing');
        }
        currentIndex = i;
        mainAudio.src = displayedSongs[i].url;
        mainAudio.play();
        document.getElementById(`card-${i}`).classList.add('playing');
        document.getElementById('now-playing').innerText = displayedSongs[i].title;
        updatePlayPauseIcon();
      }

      function togglePlay() {
        if (currentIndex === -1) return;
        mainAudio.paused ? mainAudio.play() : mainAudio.pause();
        updatePlayPauseIcon();
      }

      function updatePlayPauseIcon() {
        if (mainAudio.paused) {
          playIcon.classList.remove('fa-pause');
          playIcon.classList.add('fa-play');
        } else {
          playIcon.classList.remove('fa-play');
          playIcon.classList.add('fa-pause');
        }
      }

      function nextSong() { 
        if(displayedSongs.length > 0) playSong((currentIndex + 1) % displayedSongs.length); 
      }
      function prevSong() { 
        if(displayedSongs.length > 0) playSong((currentIndex - 1 + displayedSongs.length) % displayedSongs.length); 
      }

      function toggleLoop() {
        isLooping = !isLooping;
        mainAudio.loop = isLooping;
        const loopBtn = document.getElementById('loop-btn');
        isLooping ? loopBtn.style.opacity = '1' : loopBtn.style.opacity = '0.5';
      }
      
      mainAudio.onended = () => { if(!isLooping) nextSong(); };
      mainAudio.onplay = updatePlayPauseIcon;
      mainAudio.onpause = updatePlayPauseIcon;
      
      init();
    </script>
  </body>
</html>
